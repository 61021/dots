################
### MONITORS ###
################

source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/colors.conf

###################
### MY PROGRAMS ###
###################

# Set programs that you use
$terminal = kitty
$fileManager = nautilus
$menu = rofi -show drun -matching fuzzy -sort -sorting-method fzf -theme $HOME/.config/rofi/minimal.rasi


#################
### AUTOSTART ###
#################

# Polkit authentication agent
exec-once = systemctl --user start hyprpolkitagent.service

# Wallpaper daemon (awww)
exec-once = awww-daemon &
exec-once = sleep 1 && ~/stuff/constants/scripts/wallpaper/restore-wallpaper.sh

# Idle daemon (lock / dpms / suspend per ~/.config/hypr/hypridle.conf)
exec-once = hypridle

# Charger plug/unplug sound
exec-once = ~/stuff/constants/scripts/battery/charge-sound.sh

# Low battery notifications
exec-once = ~/stuff/constants/scripts/battery/low-bat-notification.sh

# Cliphist (text + images)
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Cursor
exec-once = hyprctl setcursor Bibata-Modern-Ice 24

# Snappy Switcher (Alt+Tab window switcher)
exec-once = snappy-switcher --daemon

# Eww daemon (KW sidebar + bar)
exec-once = eww daemon
exec-once = sleep 1 && eww open-many bar bar-1 bar-2

#############################
### ENVIRONMENT VARIABLES ###
#############################
env = SSH_AUTH_SOCK, $XDG_RUNTIME_DIR/ssh-agent.socket

# XDG Desktop Portal
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# QT
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1

# Mozilla
env = MOZ_ENABLE_WAYLAND,1


# Set the cursor size for xcursor
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# Ozone
env = OZONE_PLATFORM,wayland
env = ELECTRON_OZONE_PLATFORM_HINT,wayland

# XWayland
xwayland {
  # force_zero_scaling = true   # disable; breaks XWayland apps on HiDPI
}

###################
### PERMISSIONS ###
###################

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow
permission = /usr/(s?bin|local/bin)/hyprlock, screencopy, allow
permission = /usr/(s?bin|local/bin)/hyprpicker, screencopy, allow
permission = /usr/(s?bin|local/bin)/grim, screencopy, allow


#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 1
    col.active_border = rgba(ffffff99)
    col.inactive_border = rgba(ffffff15)
    resize_on_border = true
    allow_tearing = false
    layout = master
}

decoration {
    rounding = 12
    rounding_power = 1

    active_opacity = 1.0
    inactive_opacity = 0.9

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 2
        passes = 1

        vibrancy = 0.1696
    }
}

animations {
    enabled = true
    bezier = linear, 0, 0, 1, 1
    bezier = md3_standard, 0.2, 0, 0, 1
    bezier = md3_decel, 0.05, 0.7, 0.1, 1
    bezier = md3_accel, 0.3, 0, 0.8, 0.15
    bezier = overshot, 0.05, 0.9, 0.1, 1.1
    bezier = crazyshot, 0.1, 1.5, 0.76, 0.92
    bezier = hyprnostretch, 0.05, 0.9, 0.1, 1.0
    bezier = fluent_decel, 0.1, 1, 0, 1
    bezier = easeInOutCirc, 0.85, 0, 0.15, 1
    bezier = easeOutCirc, 0, 0.55, 0.45, 1
    bezier = easeOutExpo, 0.16, 1, 0.3, 1
    animation = windows, 1, 3, md3_decel, popin 60%
    animation = border, 1, 10, default
    animation = fade, 1, 2.5, md3_decel
    animation = workspaces, 1, 3.5, easeOutExpo, slide
    animation = specialWorkspace, 1, 3, md3_decel, slidevert
}


#####################
### WINDOW RULES ###
#####################

# Moved to ~/.config/hypr/windowrules.conf


$mainMod = ALT

master {
    new_status = slave
    bind = ALT, TAB, layoutmsg, cyclenext
    bind = ALT SHIFT, TAB, layoutmsg, cycleprev
}

misc {
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(

    # Window swallowing: hide terminal when it spawns a GUI child
    enable_swallow = true
    swallow_regex = ^(kitty|Alacritty|footclient)$
}


#############
### INPUT ###
#############

input {
    kb_layout = us, ara
    kb_variant =
    kb_model =
    kb_options = grp:caps_select
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace

# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = CTRL SHIFT, Return, exec, $terminal
bind = $mainMod, Q, killactive
bind = $mainMod, P, exec, hyprpicker -anqdl
bind = $mainMod, V, exec, cliphist list | rofi -dmenu -i -p "Clipboard" -theme $HOME/.config/rofi/minimal.rasi | cliphist decode | wl-copy
bind = $mainMod SHIFT, V, exec, cliphist wipe
bind = $mainMod, W, exec, ~/stuff/constants/scripts/wallpaper/pick-wallpaper.sh
bind = $mainMod, F1, exec, ~/.config/hypr/scripts/gamemode.sh
bind = $mainMod, G, togglefloating
bind = $mainMod, F, fullscreen, 1
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod SHIFT, M, layoutmsg, swapwithmaster
bind = SUPER, L, exec, hyprlock --grace 5
bind = CTRL SHIFT, Space, exec, $menu
bind = CTRL, F12, exec, hyprshot -m region -o ~/stuff/screenshots --notify
bind = , Print,         exec, hyprshot -m output -o ~/stuff/screenshots --notify
bind = SHIFT, Print,    exec, hyprshot -m window -o ~/stuff/screenshots --notify

# Snappy Switcher (Alt+Tab)
bind = ALT, Tab, exec, snappy-switcher next
bind = ALT SHIFT, Tab, exec, snappy-switcher prev

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

# Window/workspace rules live in their own file.
source = ~/.config/hypr/windowrules.conf


# HyprMod managed settings
source = /home/khaled/.config/hypr/hyprland-gui.conf
