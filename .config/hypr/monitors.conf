# Match monitors by hardware description so they work on any port.
# Use `hyprctl monitors all` to find descriptions.

# Laptop internal display
monitor = desc:Samsung Display Corp. 0x419D, 2880x1800@120, 0x0, 2.0

# Lenovo L27i-40 (ULAWC736) — place to the right of laptop
monitor = desc:Lenovo Group Limited L27i-40 ULAWC736, 1920x1080@100, 1440x0, 1.0

# Lenovo L27i-40 (UPA19426) — place to the right of the first external
monitor = desc:Lenovo Group Limited L27i-40 UPA19426, 1920x1080@100, 3360x0, 1.0

# Fallback: any other monitor → auto-position, preferred mode
monitor = , preferred, auto, 1
