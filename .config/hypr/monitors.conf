# Layout is now managed by ~/.config/hypr/scripts/apply-monitor-profile.sh
# (Do not run nwg-displays anymore - it will overwrite this file.)

# Static fallback only — the profile script overrides these on startup and
# every hotplug. Keeps eDP-1 at the right scale/rate if the watcher ever dies.
monitor = eDP-1, 2880x1800@120, 0x0, 2.0
monitor = , preferred, auto, 1
