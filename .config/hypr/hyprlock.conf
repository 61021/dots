# =============================================================================
# KW Lockscreen — minimal, monochrome, JetBrainsMono
# Palette: ~/stuff/constants/colors/palette.md
# =============================================================================

$bg          = rgba(0, 0, 0, 1.0)
$surface     = rgba(10, 10, 10, 0.6)
$border_soft = rgba(255, 255, 255, 0.08)
$border_hard = rgba(255, 255, 255, 0.20)
$fg          = rgba(229, 231, 235, 1.0)
$fg_hi       = rgba(248, 250, 252, 1.0)
$fg_muted    = rgba(107, 114, 128, 1.0)
$accent      = rgba(137, 221, 255, 1.0)

# -----------------------------------------------------------------------------
# General
# -----------------------------------------------------------------------------
general {
    no_fade_in           = false
    no_fade_out          = false
    hide_cursor          = true
    grace                = 0
    disable_loading_bar  = true
    ignore_empty_input   = true
}

# -----------------------------------------------------------------------------
# Background — heavy blur over wallpaper, dark tint
# -----------------------------------------------------------------------------
background {
    monitor           =
    path              = /home/khaled/stuff/constants/wallpapers/wallhaven-vgj79l.jpg
    blur_passes       = 1
    blur_size          = 1
    noise              = 0.0117
    contrast           = 0.9
    brightness         = 0.35
    vibrancy           = 0.15
    vibrancy_darkness  = 0.25
}

# -----------------------------------------------------------------------------
# Time — large, bold, centered
# -----------------------------------------------------------------------------
label {
    monitor     =
    text        = cmd[update:1000] date +"%-I:%M"
    color       = $fg_hi
    font_size   = 140
    font_family = JetBrainsMono Nerd Font ExtraBold
    position    = 0, 80
    halign      = center
    valign      = center
}

# -----------------------------------------------------------------------------
# Date — muted, beneath clock
# -----------------------------------------------------------------------------
label {
    monitor     =
    text        = cmd[update:60000] date +"%A · %B %-d"
    color       = $fg_muted
    font_size   = 16
    font_family = JetBrainsMono Nerd Font Medium
    position    = 0, -30
    halign      = center
    valign      = center
}

# -----------------------------------------------------------------------------
# Input field — minimal pill
# -----------------------------------------------------------------------------
input-field {
    monitor              =
    size                 = 320, 48
    outline_thickness    = 1
    dots_size            = 0.22
    dots_spacing         = 0.45
    dots_center          = true
    dots_rounding        = -1
    outer_color          = $border_soft
    inner_color          = $surface
    font_color           = $fg_hi
    fade_on_empty        = false
    rounding             = 14
    check_color          = $accent
    fail_color           = rgba(239, 68, 68, 1.0)
    fail_text            = <i>$ATTEMPTS attempt(s) — try again.</i>
    placeholder_text     = <span foreground="##6b7280"></span>
    hide_input           = false
    position             = 0, -230
    halign               = center
    valign               = center
}

# -----------------------------------------------------------------------------
# KW brand mark — bottom-left
# -----------------------------------------------------------------------------
label {
    monitor     =
    text        = KW
    color       = $fg_hi
    font_size   = 14
    font_family = JetBrainsMono Nerd Font Bold
    position    = 32, 24
    halign      = left
    valign      = bottom
}

# -----------------------------------------------------------------------------
# Hint — bottom-right
# -----------------------------------------------------------------------------
label {
    monitor     =
    text        = Memento Mori
    color       = $fg_muted
    font_size   = 12
    font_family = JetBrainsMono Nerd Font
    position    = -32, 24
    halign      = right
    valign      = bottom
}
