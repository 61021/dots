# ─────────────────────────────────────────────────────────────
# Window & workspace rules — modern unified syntax
# Docs: https://wiki.hypr.land/Configuring/Window-Rules/
#
# Syntax: windowrule = <effect> [args], match:<prop> <value>, ...
# ─────────────────────────────────────────────────────────────

# ── "Smart gaps" — no gaps/border when only one tiled window ─
workspace = w[tv1], gapsout:0, gapsin:0
workspace = f[1],   gapsout:0, gapsin:0
windowrule = border_size 0, match:float 0, match:workspace w[tv1]
windowrule = rounding 0,    match:float 0, match:workspace w[tv1]
windowrule = border_size 0, match:float 0, match:workspace f[1]
windowrule = rounding 0,    match:float 0, match:workspace f[1]

# Ignore maximize requests from apps (recommended)
windowrule = suppress_event maximize, match:class .*

# Fix focus issue with empty XWayland windows
windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0

# ── Floating helpers ─────────────────────────────────────────
windowrule = float on, match:class ^(pavucontrol)$
windowrule = float on, match:class ^(blueman-manager)$
windowrule = float on, match:class ^(nm-connection-editor)$
windowrule = float on, match:class ^(qalculate-gtk)$

windowrule = float on,      match:class ^(nwg-look)$
windowrule = size 700 600,  match:class ^(nwg-look)$
windowrule = center on,     match:class ^(nwg-look)$

# ── Picture-in-Picture ───────────────────────────────────────
windowrule = float on,      match:title ^(Picture-in-Picture)$
windowrule = pin on,        match:title ^(Picture-in-Picture)$
windowrule = move 69.5% 4%, match:title ^(Picture-in-Picture)$

# ── File pickers (xdg-desktop-portal-gtk) ────────────────────
windowrule = float on,  match:class ^(xdg-desktop-portal-gtk)$
windowrule = center on, match:class ^(xdg-desktop-portal-gtk)$
